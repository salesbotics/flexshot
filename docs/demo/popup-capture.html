<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../../src/popup/popup.css" />
  <style>body{margin:0}</style>
</head>
<body>
  <header class="top">
    <div class="brand">
      <img src="../../icons/icon48.png" width="28" height="28" alt="" />
      <strong>Flexshot</strong>
    </div>
    <button type="button" class="linkish">Open on page</button>
  </header>
  <nav class="tabs" role="tablist">
    <button type="button" class="tab active"><span class="tab-ico">📷</span> Screenshot</button>
    <button type="button" class="tab"><span class="tab-ico">🔴</span> Record</button>
    <button type="button" class="tab"><span class="tab-ico">⋯</span> More</button>
  </nav>
  <section class="panel active">
    <p class="lead">Choose how to capture this page</p>
    <button type="button" class="tile">
      <span class="tile-icon region" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M4 8V4h4M20 8V4h-4M4 16v4h4M20 16v4h-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><rect x="7" y="7" width="10" height="10" rx="1" stroke="currentColor" stroke-width="1.6" stroke-dasharray="3 2"/></svg></span>
      <span class="tile-text"><strong>Selected area</strong><small>Drag to choose a region</small></span>
      <span class="tile-arrow">›</span>
    </button>
    <button type="button" class="tile">
      <span class="tile-icon visible" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg></span>
      <span class="tile-text"><strong>Visible part</strong><small>What you see right now</small></span>
      <span class="tile-arrow">›</span>
    </button>
    <button type="button" class="tile">
      <span class="tile-icon full" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><rect x="5" y="2" width="14" height="20" rx="2" stroke="currentColor" stroke-width="2"/><path d="M8 7h8M8 11h8M8 15h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></span>
      <span class="tile-text"><strong>Full page</strong><small>Scroll &amp; capture everything</small></span>
      <span class="tile-arrow">›</span>
    </button>
  </section>
  <footer class="foot">After capture → annotate with pen, text, arrows, blur, crop</footer>
</body>
</html>
