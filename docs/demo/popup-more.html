<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../../src/popup/popup.css" />
  <style>body{margin:0}</style>
</head>
<body>
  <header class="top">
    <div class="brand">
      <img src="../../icons/icon48.png" width="28" height="28" alt="" />
      <strong>Flexshot</strong>
    </div>
    <button type="button" class="linkish">Open on page</button>
  </header>
  <nav class="tabs">
    <button type="button" class="tab"><span class="tab-ico">📷</span> Screenshot</button>
    <button type="button" class="tab"><span class="tab-ico">🔴</span> Record</button>
    <button type="button" class="tab active"><span class="tab-ico">⋯</span> More</button>
  </nav>
  <section class="panel active">
    <p class="lead">Extra tools</p>
    <button type="button" class="tile">
      <span class="tile-icon pdf" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M7 3h7l5 5v13a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z" stroke="currentColor" stroke-width="2"/><path d="M14 3v5h5M9 13h6M9 17h4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg></span>
      <span class="tile-text"><strong>Web → PDF</strong><small>Save this page as a PDF file</small></span>
      <span class="tile-arrow">›</span>
    </button>
    <button type="button" class="tile">
      <span class="tile-icon bar" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="18" height="12" rx="2" stroke="currentColor" stroke-width="2"/><path d="M7 12h4M13 12h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span>
      <span class="tile-text"><strong>Page capture bar</strong><small>Show big buttons on the webpage</small></span>
      <span class="tile-arrow">›</span>
    </button>
  </section>
  <footer class="foot">After capture → annotate with pen, text, arrows, blur, crop</footer>
</body>
</html>
