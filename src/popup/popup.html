<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flexshot</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="top">
    <div class="brand">
      <img src="../../icons/icon48.png" width="28" height="28" alt="" />
      <strong>Flexshot</strong>
    </div>
    <button type="button" class="linkish" id="btnPageBar" title="Show capture bar on the page">
      Open on page
    </button>
  </header>

  <nav class="tabs" role="tablist">
    <button type="button" class="tab active" role="tab" aria-selected="true" data-tab="capture">
      <span class="tab-ico">📷</span>
      Screenshot
    </button>
    <button type="button" class="tab" role="tab" aria-selected="false" data-tab="record">
      <span class="tab-ico">🔴</span>
      Record
    </button>
    <button type="button" class="tab" role="tab" aria-selected="false" data-tab="more">
      <span class="tab-ico">⋯</span>
      More
    </button>
  </nav>

  <!-- CAPTURE TAB -->
  <section class="panel active" id="panel-capture" role="tabpanel">
    <p class="lead">Choose how to capture this page</p>

    <button type="button" class="tile" data-cmd="CAPTURE_REGION">
      <span class="tile-icon region" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 8V4h4M20 8V4h-4M4 16v4h4M20 16v4h-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><rect x="7" y="7" width="10" height="10" rx="1" stroke="currentColor" stroke-width="1.6" stroke-dasharray="3 2"/></svg>
      </span>
      <span class="tile-text">
        <strong>Selected area</strong>
        <small>Drag to choose a region</small>
      </span>
      <span class="tile-arrow">›</span>
    </button>

    <button type="button" class="tile" data-cmd="CAPTURE_VISIBLE">
      <span class="tile-icon visible" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
      </span>
      <span class="tile-text">
        <strong>Visible part</strong>
        <small>What you see right now</small>
      </span>
      <span class="tile-arrow">›</span>
    </button>

    <button type="button" class="tile" data-cmd="CAPTURE_FULLPAGE">
      <span class="tile-icon full" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none"><rect x="5" y="2" width="14" height="20" rx="2" stroke="currentColor" stroke-width="2"/><path d="M8 7h8M8 11h8M8 15h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </span>
      <span class="tile-text">
        <strong>Full page</strong>
        <small>Scroll &amp; capture everything</small>
      </span>
      <span class="tile-arrow">›</span>
    </button>
  </section>

  <!-- RECORD TAB -->
  <section class="panel" id="panel-record" role="tabpanel" hidden>
    <p class="lead">Record your screen with audio</p>

    <button type="button" class="tile featured" data-cmd="OPEN_RECORDER">
      <span class="tile-icon record" aria-hidden="true">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="4" fill="currentColor"/></svg>
      </span>
      <span class="tile-text">
        <strong>Start screen record</strong>
        <small>Tab, window, or full screen + mic</small>
      </span>
      <span class="tile-arrow">›</span>
    </button>

    <ul class="tips">
      <li>Download video as WebM</li>
      <li>Optional separate audio file</li>
      <li>Annotate screenshots after capture</li>
    </ul>
  </section>

  <!-- MORE TAB -->
  <section class="panel" id="panel-more" role="tabpanel" hidden>
    <p class="lead">Extra tools</p>

    <button type="button" class="tile" data-cmd="EXPORT_PDF">
      <span class="tile-icon pdf" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none"><path d="M7 3h7l5 5v13a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z" stroke="currentColor" stroke-width="2"/><path d="M14 3v5h5M9 13h6M9 17h4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
      </span>
      <span class="tile-text">
        <strong>Web → PDF</strong>
        <small>Save this page as a PDF file</small>
      </span>
      <span class="tile-arrow">›</span>
    </button>

    <button type="button" class="tile" data-cmd="SHOW_LAUNCHER">
      <span class="tile-icon bar" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="18" height="12" rx="2" stroke="currentColor" stroke-width="2"/><path d="M7 12h4M13 12h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </span>
      <span class="tile-text">
        <strong>Page capture bar</strong>
        <small>Show big buttons on the webpage</small>
      </span>
      <span class="tile-arrow">›</span>
    </button>
  </section>

  <div class="status" id="status" hidden></div>

  <footer class="foot">
    After capture → annotate with pen, text, arrows, blur, crop
  </footer>

  <script src="popup.js"></script>
</body>
</html>
